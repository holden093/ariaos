services:
  gguf-engine:
    image: ghcr.io/ggml-org/llama.cpp:server-intel
    container_name: nixit-gguf-engine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LLAMA_PORT:-8080}:8080"
    volumes:
      - "${MODEL_DIR:-/var/home/kevin/LLMs/GGUF}:/models"
      - "${MODELS_CONFIG:-/var/home/kevin/LLMs/GGUF/config.ini}:/config/config.ini:ro"
    devices:
      - "/dev/dri:/dev/dri"
      - "/dev/accel:/dev/accel"
    security_opt:
      - "label=disable"
    environment:
      ONEAPI_DEVICE_SELECTOR: "${ONEAPI_DEVICE_SELECTOR:-level_zero:0}"
      GGML_SYCL_ENABLE_LEVEL_ZERO: "1"
      UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS: "1"
      ZES_ENABLE_SYSMAN: "1"
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--timeout"
      - "1200"
      - "--slot-save-path"
      - "/tmp"
      - "--cache-type-k"
      - "q8_0"
      - "--cache-type-v"
      - "q8_0"
      - "--models-preset"
      - "/config/config.ini"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
