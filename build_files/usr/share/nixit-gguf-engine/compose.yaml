services:
  gguf-engine:
    image: localhost/nixit-gguf-engine:latest
    build:
      context: ${NIXIT_ENGINE_DIR:-/usr/share/nixit-gguf-engine}
      dockerfile: Containerfile
    container_name: nixit-gguf-engine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LLAMA_PORT:-8080}:8080"
    volumes:
      - "${MODEL_DIR:-/var/llms/ggufs}:/models:Z"
      - "${MODELS_CONFIG:-/usr/share/nixit-gguf-engine/config/models.config}:/config/models.config:ro,Z"
    devices:
      - "/dev/dri:/dev/dri"
      - "/dev/accel:/dev/accel"
    security_opt:
      - "label=disable"
    environment:
      ONEAPI_DEVICE_SELECTOR: "${ONEAPI_DEVICE_SELECTOR:-level_zero:0}"
      GGML_SYCL_ENABLE_LEVEL_ZERO: "1"
      UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS: "1"
      ZES_ENABLE_SYSMAN: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
