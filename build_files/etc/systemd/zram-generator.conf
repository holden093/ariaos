# Configurazione zRAM ottimizzata per AriaOS
# Target: Workload pesanti (LLM / llama.cpp) su 32GB RAM

[zram0]
# 16GB di zram (50% della RAM fisica) fornisce un ottimo buffer per il sistema
# senza rubare troppa memoria fisica ai modelli caricati.
zram-size = 16384

# Algoritmo zstd: il miglior compromesso tra velocità e compressione.
# Fondamentale per comprimere dati inattivi mentre la RAM "reale" è occupata dal modello.
compression-algorithm = zstd

# Priorità alta per assicurarsi che venga usato prima di eventuali swap su disco (se presenti)
swap-priority = 100
# mount-point rimosso per usare il device come SWAP e non come filesystem
