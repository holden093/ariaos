# Ottimizzazioni di sistema per AriaOS

# 1. Miglioramento della reattività dello swapping (utile se si usano molti container/VM)
vm.swappiness=10
vm.vfs_cache_pressure=50

# 2. Ottimizzazioni di rete (migliorano throughput e latenza)
net.core.rmem_max=16777216
net.core.wmem_max=16777216
net.ipv4.tcp_rmem=4096 87380 16777216
net.ipv4.tcp_wmem=4096 65536 16777216
net.ipv4.tcp_congestion_control=bbr
net.core.default_qdisc=fq

# 3. Aumento del limite di file aperti (importante per carichi di lavoro intensivi e Podman)
fs.file-max=2097152
